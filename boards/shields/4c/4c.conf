# Display configuration - uncomment to enable nice!view support
# CONFIG_ZMK_DISPLAY=y

# Explicitly disable display if not using nice!view
CONFIG_ZMK_DISPLAY=n

# Bluetooth-only keyboard - disable USB HID
CONFIG_ZMK_USB=n

# Bluetooth troubleshooting and improvements
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_ID_MAX=5

# Enhanced Bluetooth power and connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Matrix scanning
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Split keyboard settings
CONFIG_ZMK_SPLIT_BLE=y