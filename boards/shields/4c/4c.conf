# Display configuration - ENABLED for nice!view support
CONFIG_ZMK_DISPLAY=y

# Bluetooth-only keyboard - disable USB HID
CONFIG_ZMK_USB=n

# Core Bluetooth configuration
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_ID_MAX=5

# Windows compatibility - disable 2M PHY (common fix for Windows/Intel)
CONFIG_BT_CTLR_PHY_2M=n

# Passkey entry for Windows compatibility (especially work-managed PCs)
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Enhanced Bluetooth power and discoverability
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_APPEARANCE=961

# Advertising configuration - ensure discoverability
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GAP_PERIPHERAL_PREF_PARAMS=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=42
CONFIG_BT_PERIPHERAL_PREF_SLAVE_LATENCY=0

# Extended advertising for better discoverability
CONFIG_BT_EXT_ADV=y
CONFIG_BT_EXT_ADV_MAX_ADV_SET=1

# Power management - more aggressive to ensure discoverability
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Matrix scanning
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Split keyboard settings
CONFIG_ZMK_SPLIT_BLE=y

# HID Report configuration  
CONFIG_ZMK_HID_REPORT_TYPE_HKRO=y
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# Ensure proper startup behavior
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# Additional debugging - can be disabled once working
CONFIG_LOG=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
